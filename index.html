<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Avatar Frame Generator</title>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#111827;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .container{
      width:950px;
      background:#1f2937;
      padding:24px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
    }

    .controls{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      margin-bottom:20px;
    }

    .card{
      background:#374151;
      padding:16px;
      border-radius:12px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
    }

    input[type="file"],
    input[type="range"]{
      width:100%;
    }

    button{
      background:#3b82f6;
      border:none;
      padding:12px 20px;
      border-radius:10px;
      color:white;
      cursor:pointer;
      font-weight:bold;
      margin-top:10px;
    }

    button:hover{
      background:#2563eb;
    }

    .canvas-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
    }

    canvas{
      background:#000;
      border-radius:16px;
      border:2px solid #4b5563;
    }

    .sliders{
      margin-top:10px;
    }

    .sliders div{
      margin-bottom:12px;
    }

    .footer{
      text-align:center;
      margin-top:16px;
      opacity:0.7;
      font-size:13px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Avatar Frame Generator</h1>

  <div class="controls">
    <div class="card">
      <label>Upload Avatar</label>
      <input type="file" id="avatarInput" accept="image/*">

      <label style="margin-top:14px;">Upload Frame PNG</label>
      <input type="file" id="frameInput" accept="image/png">

      <div class="sliders">
        <div>
          <label>Zoom Avatar</label>
          <input type="range" id="scaleSlider" min="0.5" max="3" step="0.01" value="1">
        </div>

        <div>
          <label>Move X</label>
          <input type="range" id="xSlider" min="-300" max="300" step="1" value="0">
        </div>

        <div>
          <label>Move Y</label>
          <input type="range" id="ySlider" min="-300" max="300" step="1" value="0">
        </div>
      </div>

      <button id="downloadBtn">Download PNG</button>
    </div>

    <div class="canvas-wrap">
      <canvas id="canvas" width="600" height="600"></canvas>
    </div>
  </div>

  <div class="footer">
    Avatar Frame Generator • HTML + CSS + JavaScript
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const avatarInput = document.getElementById("avatarInput");
const frameInput = document.getElementById("frameInput");

const scaleSlider = document.getElementById("scaleSlider");
const xSlider = document.getElementById("xSlider");
const ySlider = document.getElementById("ySlider");

const downloadBtn = document.getElementById("downloadBtn");

let avatarImg = null;
let frameImg = null;

function loadImage(file, callback){
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => callback(img);
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

avatarInput.addEventListener("change", e => {
  const file = e.target.files[0];
  if(file){
    loadImage(file, img => {
      avatarImg = img;
      drawCanvas();
    });
  }
});

frameInput.addEventListener("change", e => {
  const file = e.target.files[0];
  if(file){
    loadImage(file, img => {
      frameImg = img;
      drawCanvas();
    });
  }
});

[scaleSlider, xSlider, ySlider].forEach(el => {
  el.addEventListener("input", drawCanvas);
});

function drawCanvas(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(avatarImg){
    const scale = parseFloat(scaleSlider.value);
    const moveX = parseInt(xSlider.value);
    const moveY = parseInt(ySlider.value);

    const size = Math.min(avatarImg.width, avatarImg.height);

    ctx.save();

    ctx.beginPath();
    ctx.arc(canvas.width/2, canvas.height/2, 240, 0, Math.PI*2);
    ctx.closePath();
    ctx.clip();

    ctx.drawImage(
      avatarImg,
      canvas.width/2 - (size * scale)/2 + moveX,
      canvas.height/2 - (size * scale)/2 + moveY,
      size * scale,
      size * scale
    );

    ctx.restore();
  }

  if(frameImg){
    ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
  }
}

downloadBtn.addEventListener("click", () => {
  const link = document.createElement("a");
  link.download = "avatar-frame.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
});
</script>

</body>
</html>
